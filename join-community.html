<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join Community</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/join-community.css" />
  </head>
  <body>
    <div class="join-container">
      <!-- Close button -->
      <span class="close-btn">&times;</span>

      <!-- Sign Up Form -->
      <div id="signupFormWrapper">
        <h2>Join Our Community</h2>
        <form id="joinForm">
          <label for="fullname">Full Name</label>
          <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="Enter your full name"
            required
          />

          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />

          <label for="reason">Why do you want to join?</label>
          <textarea
            id="reason"
            name="reason"
            rows="3"
            placeholder="Type your reason..."
          ></textarea>

          <p class="or-text">— or choose from the list —</p>

          <label for="reasonOption">Select a reason</label>
          <select id="reasonOption" name="reasonOption">
            <option value="">Select a reason...</option>
            <option value="Networking with developers">
              Networking with developers
            </option>
            <option value="Learning new skills">Learning new skills</option>
            <option value="Collaborating on projects">
              Collaborating on projects
            </option>
          </select>

          <button type="submit" class="btn-primary">Join Community</button>
        </form>
        <p class="switch-text">
          Already a member? <a href="#" id="showSignin">Sign in here</a>
        </p>
      </div>

      <!-- Sign In Form -->
      <div id="signinFormWrapper" style="display: none">
        <h2>Sign In</h2>
        <form id="signinForm">
          <label for="signinEmail">Email Address</label>
          <input
            type="email"
            id="signinEmail"
            name="signinEmail"
            placeholder="Enter your email"
            required
          />

          <label for="signinPassword">Password</label>
          <input
            type="password"
            id="signinPassword"
            name="signinPassword"
            placeholder="Enter your password"
            required
          />

          <button type="submit" class="btn-primary">Sign In</button>
          <button type="button" class="btn-secondary" id="backToSignup">
            ← Back to Sign Up
          </button>
        </form>
        <button class="reset-password-btn" id="reset-password-btn">
          Reset Password?
        </button>
        <p class="switch-text">
          New here? <a href="#" id="showSignup">Join Community</a>
        </p>
      </div>
    </div>

    <script src="js/joinCommunityModal.js"></script>
  </body>
</html>
