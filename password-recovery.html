<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password reset</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/recovery.css" />
  </head>
  <body>
    <h3>Login help</h3>
    <div class="center-wrapper">
      <div class="recovery-container">
        <div>
          <h4>Reset Your Password</h4>
          <p>Enter your email and new password.</p>
        </div>
         <form class="recovery-form" id="recovery-form">
        <input type="email" id="email" name="email" placeholder="Enter your Email" required />
        
        <div class="password-wrapper">
          <input type="password" id="newPassword" name="newPassword" placeholder="Enter New Password" required />
          <span class="toggle" onclick="togglePassword('newPassword', this)">👁️</span>
        </div>

        <div class="password-wrapper">
          <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm New Password" required />
          <span class="toggle" onclick="togglePassword('confirmPassword', this)">👁️</span>
        </div>


        <button type="submit">Reset Password</button>
      </form>

      </div>
    </div>

    <script src="js/password-reset.js"></script>
  </body>
</html>
